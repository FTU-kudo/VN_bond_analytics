name: Weekly Bond Yield Update

on:
  schedule:
    # Chạy vào 00:00 sáng thứ Hai hàng tuần (Giờ UTC, tương đương 07:00 giờ VN)
    - cron: '16 0 * * 0'
  workflow_dispatch: # Cho phép chạy thủ công để test

jobs:
  update-bond-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Cấp quyền cho bot tự commit file vào repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Main Script
      run: |
        python src/main.py

    - name: Commit and Push Output Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add output/
        git commit -m "Auto-update: Weekly Bond Yield Data & Reports $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
        git push
